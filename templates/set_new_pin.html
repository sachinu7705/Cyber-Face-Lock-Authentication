<div class="card">
    <h2>Set New PIN</h2>
    <input id="pin1" type="password" placeholder="Enter new PIN">
    <input id="pin2" type="password" placeholder="Confirm new PIN">
    <button onclick="savePIN()">Save PIN</button>
</div>

<script>
async function savePIN() {
    const urlParams = new URLSearchParams(window.location.search);
    let email = urlParams.get("email");

    let p1 = document.getElementById("pin1").value;
    let p2 = document.getElementById("pin2").value;

    if (p1 !== p2) return alert("PIN does not match");

    let res = await fetch("/api/set_new_pin", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, new_pin: p1})
    });

    let data = await res.json();
    alert(data.message);

    if (data.success) window.location.href = "/mobile";
}
</script>
