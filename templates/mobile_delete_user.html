<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete User - CyberLock</title>

    <link rel="stylesheet" href="/static/css/cyber_common.css">
    <style>
        /* Additional styles for delete user page */
        .delete-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 0, 85, 0.05);
            border: 1px solid #331111;
            margin-bottom: 12px;
            padding: 15px 20px;
            border-left: 3px solid #ff0055;
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        
        .delete-item:hover {
            background: rgba(255, 0, 85, 0.1);
            transform: translateX(5px);
            border-left-width: 5px;
        }
        
        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #ff2b2b, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            color: #fff;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .user-details {
            font-size: 11px;
            color: #888;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .user-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 8px;
        }
        
        .badge-face {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .badge-no-face {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }
        
        .badge-admin {
            background: rgba(255, 43, 43, 0.2);
            color: #ff2b2b;
        }
        
        .delete-btn {
            background: linear-gradient(135deg, #ff0055, #cc0044);
            color: white;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 12px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        
        .delete-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
        }
        
        .delete-btn:active {
            transform: scale(0.98);
        }
        
        .stats-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 0, 85, 0.2);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ff0055;
            font-family: monospace;
        }
        
        .stat-label {
            font-size: 10px;
            color: #888;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .warning-text {
            color: #ffaa44;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #00f2ff;
            font-family: monospace;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
    <script src="/static/js/mobile_delete_user.js" defer></script>
</head>

<body class="cyber-shell">

<header class="cyber-top">
    <button onclick="history.back()" class="back">←</button>
    <div class="header-block">
        <div class="app-title">🗑️ DELETE USER</div>
        <div class="tagline">Permanently Remove Face Profile</div>
    </div>
</header>

<main class="list-container">
    <!-- Stats Card (will be populated by JS) -->
    
    
    <!-- Delete List -->
    <div id="deleteList" class="delete-list">
        <div class="loading">🔍 LOADING USERS...</div>
    </div>
</main>

<!-- Custom Confirmation Modal -->
<div id="confirmModal" class="confirm-modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
        <div class="modal-icon">⚠️</div>
        <div class="modal-title">PERMANENT DELETE</div>
        <div class="modal-message" id="modalMessage">Are you sure?</div>
        <div class="modal-buttons">
            <button id="modalConfirm" class="modal-btn danger">DELETE</button>
            <button id="modalCancel" class="modal-btn secondary">CANCEL</button>
        </div>
    </div>
</div>

<style>
    /* Modal Styles */
    .confirm-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .modal-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
    }
    
    .modal-content {
        position: relative;
        background: linear-gradient(135deg, #0a0a0a, #030305);
        border: 2px solid #ff0055;
        border-radius: 16px;
        padding: 30px;
        max-width: 400px;
        width: 90%;
        text-align: center;
        box-shadow: 0 0 40px rgba(255, 0, 85, 0.3);
        animation: modalSlideIn 0.3s ease;
        z-index: 10001;
    }
    
    @keyframes modalSlideIn {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
    
    .modal-icon {
        font-size: 48px;
        margin-bottom: 15px;
    }
    
    .modal-title {
        font-size: 20px;
        font-weight: bold;
        color: #ff0055;
        margin-bottom: 15px;
        font-family: monospace;
        letter-spacing: 2px;
    }
    
    .modal-message {
        color: #fff;
        margin-bottom: 25px;
        font-size: 14px;
        line-height: 1.5;
    }
    
    .modal-buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
    }
    
    .modal-btn {
        padding: 10px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        transition: all 0.2s;
        border: none;
    }
    
    .modal-btn.danger {
        background: linear-gradient(135deg, #ff0055, #cc0044);
        color: white;
    }
    
    .modal-btn.danger:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
    }
    
    .modal-btn.secondary {
        background: transparent;
        color: #999;
        border: 1px solid #333;
    }
    
    .modal-btn.secondary:hover {
        border-color: #ff0055;
        color: #ff0055;
    }
    
    /* Toast Notification */
    .toast-notification {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.95);
        padding: 12px 24px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 14px;
        z-index: 10002;
        border: 1px solid #ff0055;
        backdrop-filter: blur(5px);
        white-space: nowrap;
        animation: toastFadeIn 0.3s ease;
    }
    
    @keyframes toastFadeIn {
        from {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    }
</style>

</body>
</html>
