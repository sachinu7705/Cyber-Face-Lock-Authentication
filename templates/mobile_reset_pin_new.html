<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reset PIN</title>

    <link rel="stylesheet" href="/static/css/cyber_common.css">
    <script src="/static/js/reset_pin.js" defer></script>
</head>

<body class="cyber-shell">

<header class="cyber-top">
  <button onclick="history.back()" class="back">←</button>
  <div class="header-block">
      <div class="app-title">RESET PIN</div>
      <div class="tagline">Recover your lock PIN</div>
  </div>
</header>

<main class="glass-section list-container">

    <!-- STEP 1 — Email Row (Just like /view-email design) -->
    <div class="email-row">
        <div class="email-left">
            <label class="lbl">Registered Email</label>
            <input type="email" id="emailInput" class="input small-input" placeholder="your@email.com">
        </div>

        <div class="email-right">
            <button class="cyber-btn small-btn" id="sendOtpBtn">Send OTP</button>
        </div>
    </div>

    <div id="status" class="status"></div>

    <!-- STEP 2 — OTP SECTION (same style as register-email page) -->
    <div id="otpSection" class="otp-section" style="display:none;">
        <label class="lbl">Enter 6-digit OTP</label>

        <div class="otp-box-container">
            <input maxlength="1" class="otp-box">
            <input maxlength="1" class="otp-box">
            <input maxlength="1" class="otp-box">
            <input maxlength="1" class="otp-box">
            <input maxlength="1" class="otp-box">
            <input maxlength="1" class="otp-box">
        </div>

        <button class="cyber-btn small-btn" id="verifyOtpBtn">Verify</button>

        <div id="resendWrapper" style="display:none;">
            <button id="resendBtn" class="cyber-btn small-btn resend-disabled">
                Resend Code (60s)
            </button>
        </div>
    </div>

    <!-- STEP 3 — NEW PIN -->
    <div id="pinSection" style="display:none; margin-top:20px;">

        <label class="lbl">New 4-digit PIN</label>
        <input type="password" class="input pin-input" id="pin1" maxlength="4">

        <label class="lbl">Confirm PIN</label>
        <input type="password" class="input pin-input" id="pin2" maxlength="4">

        <button class="cyber-btn small-btn" id="savePinBtn">Save PIN</button>
    </div>

</main>

</body>
</html>
