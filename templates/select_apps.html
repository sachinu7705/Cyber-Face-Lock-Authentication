<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Select Apps — App Locker</title>
  <link rel="stylesheet" href="/static/css/select_apps.css">
  <link rel="stylesheet" href="/static/css/cyber_common.css">
</head>

<body>
  <div class="cyber-shell">

    <!-- TOP BAR -->
    <header class="cyber-top">
      <a class="back" id="goBackBtn">⟵</a>
      <div>
        <h2 class="app-title">SELECT APPS</h2>
        <p class="tagline">Pick apps to protect with Face or PIN</p>
      </div>
    </header>

    <!-- SEARCH BAR -->
    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search apps..." class="search-input">
    </div>

    <!-- MAIN PANEL -->
    <main class="select-panel card">

      <!-- APPS LIST -->
      <div id="appsList" class="apps-list"></div>

      <!-- BOTTOM BUTTONS -->
      <div class="btn-row" style="margin-top:12px">
        <button id="saveAppsBtn" class="btn btn-danger btn-wide">Save Locked Apps</button>
        <a href="/mobile/settings" class="btn btn-outline">Back to Settings</a>
      </div>

      <div id="selectMsg" class="status"></div>
    </main>

  </div>

  <!-- POPUP FOR APP SETTINGS -->
  <div id="appPopup" class="popup hidden">
      <div class="popup-inner">
          <h3 id="popupTitle">App Settings</h3>

          <label class="pop-lbl">
              <input type="checkbox" id="opt_pin"> Require PIN
          </label>

          <label class="pop-lbl">
              <input type="checkbox" id="opt_face"> Allow Face Unlock
          </label>

          <div class="pop-btn-row">
              <button id="popupSaveBtn" class="cyber-btn small-btn">Save</button>
              <button id="popupCancelBtn" class="cyber-btn small-btn btn-ghost">Cancel</button>
          </div>
      </div>
  </div>

  <script src="/static/js/select_apps.js"></script>
</body>
</html>
