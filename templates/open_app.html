<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open App – Face Unlock</title>

  <link rel="stylesheet" href="/static/css/open_app.css">
</head>

<body>
<div class="cyber-shell">

  <!-- TOP BAR -->
  <header class="cyber-top">
    <a class="back" id="goBackBtn">⟵</a>

    <h1 class="app-title">OPEN APP</h1>
  </header>

  <!-- CENTER SCAN PANEL -->
  <main class="scan-panel">

    <div class="app-box">
      <div class="icon-wrap">
        <img id="appIcon" src="/static/assets/default_app.png">
      </div>
      <div id="appName" class="app-name">App Name</div>
    </div>

    <div class="video-box">
      <video id="unlockVideo" autoplay playsinline></video>
      <canvas id="overlay"></canvas>

      <div class="scan-ring">
        <div class="ring-core"></div>
      </div>
    </div>

    <div id="status" class="status">Initializing camera…</div>

    <button id="pinBtn" class="btn btn-outline">USE PIN INSTEAD</button>

  </main>

  <!-- FOOTER -->
  <footer class="cyber-footer">
    <div class="marquee">CYBER FACE UNLOCK SYSTEM — SECURE MODE</div>
  </footer>

</div>

<!-- PIN MODAL -->
<div id="pinModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-title">Enter PIN</div>
    <input id="pinInput" type="password" class="modal-input" placeholder="PIN">
    <button id="pinConfirm" class="btn btn-danger btn-wide">UNLOCK</button>
    <button id="pinClose" class="btn btn-ghost btn-wide">CANCEL</button>
  </div>
</div>

<script>
  // App name/icon passed from Flask using query params:
  const p = new URLSearchParams(window.location.search);
  document.getElementById("appName").innerText = p.get("name") || "Unknown App";
  document.getElementById("appIcon").src = p.get("icon") || "/static/assets/default_app.png";
</script>

<script src="/static/js/open_app.js"></script>
</body>
</html>
