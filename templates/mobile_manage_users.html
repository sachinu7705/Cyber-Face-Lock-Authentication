<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>
    <link rel="stylesheet" href="/static/css/mobile_manage_users.css">
</head>
<body class="cyberpunk-shell">

<header class="cyber-top">
    <button class="back-btn" id="goBack">⟵</button>
    <div>
        <div class="title">MANAGE USERS</div>
        <div class="subtitle">Add • Delete • View • Register Email</div>
    </div>
</header>

<div class="menu-grid">

    <div class="menu-box" id="viewUsers">
        <div class="icon">📑</div>
        <div class="label">View Users</div>
        <div class="small">See enrolled faces</div>
    </div>
        <div class="menu-box neon-purple" id="launcherApps">
        <div class="icon">🚀</div>
        <div class="label">Apps Launcher</div>
        <div class="small">Open Installed Apps</div>
    </div>


    <div class="menu-box" id="addUsers">
        <div class="icon">➕</div>
        <div class="label">Add User</div>
        <div class="small">Enroll new identity</div>
    </div>

    <div class="menu-box" id="deleteUsers">
        <div class="icon">🗑</div>
        <div class="label">Delete User</div>
        <div class="small">Remove stored user</div>
    </div>

    <div class="menu-box neon-purple" id="registerEmail">
        <div class="icon">📧</div>
        <div class="label">Register Email</div>
        <div class="small">Email for PIN reset</div>
    </div>

</div>

<script src="/static/js/mobile_manage_users.js"></script>

</body>
</html>
