<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Change PIN</title>

  <link rel="stylesheet" href="/static/css/change_pin.css">
  <script src="/static/js/matrix_bg.js" defer></script>
  <script src="/static/js/change_pin.js" defer></script>
</head>

<body>

<canvas id="matrix-bg"></canvas>

<div class="cyber-shell">

  <header class="cyber-top">
    <a class="back" href="javascript:history.back()">⟵</a>
    <div>
      <h2 class="app-title">CHANGE PIN</h2>
      <p class="tagline">FACE-ID + PIN SECURITY</p>
    </div>
  </header>

  <main class="panel">

    <div class="pin-card">
      <label class="lbl">OLD PIN</label>
      <input type="password" id="oldPin" class="pin-input" placeholder="Enter current PIN">

      <label class="lbl">NEW PIN</label>
      <input type="password" id="newPin" class="pin-input" placeholder="Enter new PIN">

      <label class="lbl">CONFIRM NEW PIN</label>
      <input type="password" id="confirmPin" class="pin-input" placeholder="Re-enter new PIN">

      <button id="savePinBtn" class="btn-danger btn-wide">UPDATE PIN</button>

      <p id="pinStatus" class="status"></p>
    </div>

  </main>

  <footer class="cyber-footer">
    <div class="marquee">PIN UPDATE PANEL — CYBER DEFENSE ACTIVE</div>
  </footer>

</div>

</body>
</html>
