services:
  - type: web
    name: cyberlock
    env: python
    buildCommand: |
      apt-get update
      apt-get install -y cmake libopenblas-dev liblapack-dev libx11-dev
      pip install -r requirements.txt
    startCommand: gunicorn web_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

